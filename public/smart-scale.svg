<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Metallic gradient for the handle -->
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E5E5EA"/>
      <stop offset="50%" stop-color="#D1D1D6"/>
      <stop offset="100%" stop-color="#8E8E93"/>
    </linearGradient>
    
    <!-- Dark glass gradient for the scale body -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1E"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Subtle reflection -->
    <linearGradient id="reflection" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background Cord -->
  <path d="M200 40 v60" stroke="#333" stroke-width="4" stroke-linecap="round"/>

  <!-- The Handle -->
  <rect x="80" y="20" width="240" height="30" rx="15" fill="#111" />
  <rect x="90" y="25" width="100" height="20" rx="10" fill="url(#metal)" />
  <rect x="210" y="25" width="100" height="20" rx="10" fill="url(#metal)" />

  <!-- The Scale Body -->
  <rect x="50" y="80" width="300" height="300" rx="40" fill="url(#glass)" />
  
  <!-- Reflection Layer -->
  <path d="M50 120 Q200 80 350 120 L350 340 Q200 380 50 340 Z" fill="url(#reflection)" />

  <!-- Diagonal division lines (8-electrode design) -->
  <line x1="200" y1="80" x2="200" y2="380" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <line x1="50" y1="230" x2="350" y2="230" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- Digital Display -->
  <text x="200" y="140" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#FFF" text-anchor="middle" letter-spacing="2">56.00</text>
  <text x="260" y="140" font-family="'Inter', sans-serif" font-size="14" fill="#FFF">kg</text>

  <!-- Center Logo/Electrode Hub -->
  <circle cx="200" cy="230" r="25" fill="#111" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <path d="M190 225 L210 225 M200 215 L200 235" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="230" r="10" fill="none" stroke="#FFF" stroke-width="2"/>
</svg>
